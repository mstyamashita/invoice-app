<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>請求書作成アプリ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background:#FFF5F7; color:#3a2a2e; font-size:15px; line-height:1.6; }
    .app { max-width:820px; margin:0 auto; padding:2rem 1.5rem 4rem; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid #F2C4CE; flex-wrap:wrap; gap:10px; }
    .page-header h1 { font-size:22px; font-weight:600; color:#b05070; }
    .inv-badge { background:#FFE4EC; color:#b05070; font-size:13px; font-weight:600; padding:5px 14px; border-radius:20px; border:1px solid #F2C4CE; }
    .card { background:#fff; border:1px solid #F2C4CE; border-radius:14px; padding:1.5rem; margin-bottom:1.25rem; box-shadow:0 2px 8px rgba(220,100,130,.06); }
    .section-title { font-size:12px; font-weight:600; color:#c47a8a; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:14px; }
    .inv-num-display { background:#FFF0F4; border:1px solid #F2C4CE; border-radius:8px; padding:10px 14px; font-size:16px; font-weight:700; color:#b05070; letter-spacing:0.05em; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    .field { display:flex; flex-direction:column; gap:5px; }
    .field label { font-size:13px; color:#8a5a65; font-weight:500; }
    .field input, .field select, .field textarea { border:1px solid #F2C4CE; border-radius:8px; padding:9px 12px; font-size:14px; color:#3a2a2e; font-family:inherit; background:#fff; width:100%; transition:border-color .15s; }
    .field input:focus, .field select:focus, .field textarea:focus { outline:none; border-color:#e07090; box-shadow:0 0 0 3px rgba(220,100,130,.12); }
    .field textarea { resize:vertical; min-height:70px; }

    /* インボイス切り替えトグル */
    .invoice-toggle-card { background:#fff; border:1px solid #F2C4CE; border-radius:14px; padding:1.25rem 1.5rem; margin-bottom:1.25rem; box-shadow:0 2px 8px rgba(220,100,130,.06); }
    .toggle-row { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .toggle-label { font-size:14px; font-weight:600; color:#3a2a2e; }
    .toggle-btns { display:flex; background:#FFF0F4; border-radius:8px; padding:3px; gap:3px; }
    .toggle-btn { padding:7px 20px; border:none; border-radius:6px; font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; background:transparent; color:#c47a8a; transition:all .15s; }
    .toggle-btn.active-nashi { background:#fff; color:#3a2a2e; box-shadow:0 1px 3px rgba(220,100,130,.15); }
    .toggle-btn.active-ari { background:#e07090; color:#fff; box-shadow:0 1px 3px rgba(200,80,110,.25); }
    .inv-number-field { display:none; flex:1; min-width:220px; }
    .inv-number-field.show { display:block; }
    .inv-tag { display:inline-block; font-size:12px; font-weight:600; padding:3px 10px; border-radius:12px; margin-left:8px; }
    .inv-tag.ari { background:#FFE4EC; color:#b05070; border:1px solid #F2C4CE; }
    .inv-tag.nashi { background:#FFF5F7; color:#c47a8a; border:1px solid #F2C4CE; }

    /* 明細テーブル */
    .items-table { width:100%; border-collapse:collapse; }
    .items-table th { font-size:12px; font-weight:600; color:#c47a8a; padding:6px 8px; text-align:left; border-bottom:1px solid #F2C4CE; }
    .items-table td { padding:6px 4px; vertical-align:middle; }
    .items-table input, .items-table select { border:1px solid #F2C4CE; border-radius:6px; padding:7px 8px; font-size:13px; color:#3a2a2e; background:#fff; width:100%; font-family:inherit; }
    .items-table input:focus, .items-table select:focus { outline:none; border-color:#e07090; }
    .item-amount { text-align:right; font-size:13px; font-weight:600; color:#3a2a2e; padding-right:8px; white-space:nowrap; }
    .del-btn { background:none; border:none; color:#c47a8a; cursor:pointer; font-size:18px; padding:4px 6px; border-radius:6px; line-height:1; transition:background .15s, color .15s; }
    .del-btn:hover { background:#FFE4EC; color:#b05070; }
    .add-btn { background:none; border:1px dashed #F2C4CE; border-radius:8px; padding:9px 16px; font-size:13px; color:#c47a8a; cursor:pointer; width:100%; margin-top:12px; font-family:inherit; transition:background .15s; }
    .add-btn:hover { background:#FFF5F7; border-color:#e07090; color:#b05070; }

    /* 合計エリア */
    .totals-box { max-width:300px; margin-left:auto; margin-top:14px; }
    .total-row { display:flex; justify-content:space-between; padding:5px 0; font-size:14px; color:#8a5a65; border-bottom:1px solid #fce8ed; }
    .total-row.grand { font-size:18px; font-weight:700; color:#b05070; border-bottom:none; border-top:2px solid #F2C4CE; padding-top:10px; margin-top:6px; }
    .tax-note { font-size:12px; color:#c47a8a; margin-top:8px; }

    /* アクション */
    .actions { display:flex; gap:12px; justify-content:flex-end; margin-top:1.75rem; }
    .btn-secondary { background:#fff; border:1px solid #F2C4CE; border-radius:10px; padding:11px 22px; font-size:14px; color:#b05070; cursor:pointer; font-family:inherit; font-weight:500; transition:background .15s; }
    .btn-secondary:hover { background:#FFF5F7; }
    .btn-primary { background:#e07090; border:none; border-radius:10px; padding:11px 22px; font-size:14px; color:#fff; cursor:pointer; font-family:inherit; font-weight:500; transition:opacity .15s; }
    .btn-primary:hover { opacity:.85; }
    .success-msg { background:#FFE4EC; color:#b05070; border:1px solid #F2C4CE; border-radius:8px; padding:12px 16px; font-size:14px; display:none; margin-top:14px; }

    /* プレビュー */
    .overlay { display:none; position:fixed; inset:0; background:rgba(180,80,100,.3); z-index:200; align-items:center; justify-content:center; padding:16px; }
    .overlay.open { display:flex; }
    .preview-box { background:#fff; border-radius:12px; padding:2.5rem 3rem 2rem; width:100%; max-width:720px; max-height:95vh; overflow-y:auto; border:1px solid #F2C4CE; }

    /* 請求書タイトルエリア */
    .preview-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1.2rem; padding-bottom:1rem; border-bottom:3px solid #b05070; }
    .preview-title-block { flex:1; }
    .preview-top h2 { font-size:32px; font-weight:700; color:#b05070; letter-spacing:.1em; }
    .preview-inv-num { font-size:12px; color:#c47a8a; margin-top:4px; }
    .close-btn { background:none; border:none; font-size:22px; cursor:pointer; color:#c47a8a; line-height:1; padding:4px; }
    .close-btn:hover { color:#b05070; }

    /* 提出者・請求先 */
    .preview-meta { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; margin-bottom:1.2rem; padding-bottom:1rem; border-bottom:1px solid #F2C4CE; }
    .meta-label { font-size:10px; font-weight:700; color:#c47a8a; text-transform:uppercase; letter-spacing:.1em; margin-bottom:3px; }
    .meta-value { font-size:15px; font-weight:700; color:#3a2a2e; }
    .meta-sub { font-size:12px; color:#8a5a65; margin-top:3px; line-height:1.7; }

    /* 明細テーブル */
    .preview-table { width:100%; border-collapse:collapse; font-size:13px; margin-bottom:.8rem; }
    .preview-table thead tr { background:#FFF0F4; }
    .preview-table th { font-size:11px; font-weight:700; color:#b05070; letter-spacing:.06em; padding:8px 10px; border-top:1px solid #F2C4CE; border-bottom:1px solid #F2C4CE; text-align:left; }
    .preview-table th:last-child { text-align:right; }
    .preview-table td { padding:8px 10px; border-bottom:1px solid #fce8ed; color:#3a2a2e; font-size:13px; }
    .preview-table td:last-child { text-align:right; font-weight:600; }
    .preview-table tbody tr:last-child td { border-bottom:2px solid #F2C4CE; }

    /* 合計 */
    .preview-totals { max-width:260px; margin-left:auto; font-size:13px; margin-bottom:1rem; }
    .pt-row { display:flex; justify-content:space-between; padding:4px 0; color:#8a5a65; }
    .pt-row.grand { font-size:16px; font-weight:700; color:#fff; background:#b05070; padding:10px 14px; border-radius:6px; margin-top:8px; }

    /* 振込先・備考 */
    .preview-notes { margin-top:1rem; padding-top:1rem; border-top:1px solid #F2C4CE; font-size:12px; color:#5a3a42; line-height:1.8; }
    .preview-notes strong { font-size:10px; font-weight:700; color:#b05070; text-transform:uppercase; letter-spacing:.1em; display:block; margin-bottom:3px; margin-top:.8rem; }
    .preview-notes strong:first-child { margin-top:0; }
    .preview-actions { display:flex; gap:12px; justify-content:flex-end; margin-top:1.5rem; padding-top:1rem; border-top:1px solid #F2C4CE; }

    /* インボイス登録番号バッジ（プレビュー内） */
    .inv-reg-badge { display:inline-block; background:#FFE4EC; color:#b05070; font-size:11px; font-weight:600; padding:2px 8px; border-radius:4px; border:1px solid #F2C4CE; margin-top:4px; }

    @media (max-width:600px) {
      .grid2, .grid3 { grid-template-columns:1fr; }
      .preview-meta { grid-template-columns:1fr; }
      .actions { flex-direction:column; }
      .btn-primary, .btn-secondary { width:100%; text-align:center; }
    }

    @media print {
      @page { margin: 15mm; size: A4; }
      /* ヘッダー・フッター（日時・URL）を非表示 */
      html { -webkit-print-color-adjust: exact; }
      head::before, head::after { display:none; }
      /* フォーム画面を非表示にしてプレビューのみ印刷 */
      body > .app { display:none !important; }
      .overlay { display:block !important; position:static !important; background:none !important; padding:0 !important; }
      .preview-box { box-shadow:none !important; border:none !important; max-height:none !important; padding:0 !important; border-radius:0 !important; }
      .preview-actions { display:none !important; }
      .close-btn { display:none !important; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="page-header">
    <h1>請求書作成アプリ</h1>
    <span class="inv-badge" id="inv-badge">番号生成中...</span>
  </div>

  <!-- 請求書番号 -->
  <div class="card">
    <div class="section-title">請求書番号（自動採番）</div>
    <div class="inv-num-display" id="inv-num-display">--</div>
  </div>

  <!-- インボイス切り替え -->
  <div class="invoice-toggle-card">
    <div class="section-title">インボイス登録</div>
    <div class="toggle-row">
      <div class="toggle-btns">
        <button class="toggle-btn active-nashi" id="btn-nashi" onclick="setInvoiceMode('nashi')">登録なし</button>
        <button class="toggle-btn" id="btn-ari" onclick="setInvoiceMode('ari')">登録あり</button>
      </div>
      <span class="inv-tag nashi" id="inv-mode-tag">適格請求書発行事業者ではない</span>
      <div class="inv-number-field" id="inv-number-wrap">
        <div class="field">
          <label>登録番号（T + 13桁）</label>
          <input type="text" id="inv-reg-number" placeholder="T1234567890123" oninput="onRegNumberInput(this.value)">
        </div>
      </div>
    </div>
  </div>

  <!-- 提出者情報 -->
  <div class="card">
    <div class="section-title">提出者情報</div>
    <div class="field">
      <label>氏名 <span style="color:#E24B4A">*</span></label>
      <input type="text" id="submitter-name" placeholder="本名（フルネーム）">
    </div>
    <div class="grid2" style="margin-top:12px">
      <div class="field"><label>住所</label><input type="text" id="submitter-address" placeholder="東京都〇〇区..."></div>
      <div class="field"><label>電話番号</label><input type="tel" id="submitter-tel" placeholder="090-0000-0000"></div>
    </div>
  </div>

  <!-- 請求先・日付 -->
  <div class="card">
    <div class="section-title">請求先・請求日</div>
    <div class="grid3">
      <div class="field"><label>請求先</label><input type="text" id="recipient" value="株式会社21" readonly style="background:#f5f5f0; color:#888780; cursor:default;"></div>
      <div class="field"><label>請求日</label><input type="date" id="invoice-date" readonly style="background:#FFF0F4; color:#8a5a65; cursor:default;"></div>
      <div class="field"><label>支払期限</label><input type="date" id="due-date" readonly style="background:#FFF0F4; color:#8a5a65; cursor:default;"></div>
    </div>
    <div class="field" style="margin-top:12px">
      <label>件名</label>
      <select id="subject">
        <option value="Instagram運用サポート">Instagram運用サポート</option>
        <option value="自社講座運営">自社講座運営</option>
      </select>
    </div>
  </div>

  <!-- 明細 -->
  <div class="card">
    <div class="section-title">明細</div>
    <table class="items-table">
      <thead>
        <tr>
          <th style="width:34%">品目</th>
          <th style="width:10%">数量</th>
          <th style="width:12%">単位</th>
          <th style="width:16%">単価（円）</th>
          <th style="width:18%" id="th-kingaku">金額</th>
          <th style="width:10%" id="th-zeikomi" style="display:none"></th>
          <th style="width:6%"></th>
        </tr>
      </thead>
      <tbody id="items-body"></tbody>
    </table>
    <button class="add-btn" id="add-item-btn">＋ 明細を追加する</button>

    <div class="totals-box" id="totals-box">
      <!-- 登録なし -->
      <div id="totals-nashi">
        <div class="total-row grand"><span>合計金額</span><span id="grand-total-nashi">¥0</span></div>
      </div>
      <!-- 登録あり -->
      <div id="totals-ari" style="display:none">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
          <label style="font-size:13px; color:#5F5E5A; font-weight:500; white-space:nowrap;">消費税率：</label>
          <select id="tax-rate" style="border:1px solid #d3d1c7; border-radius:8px; padding:5px 10px; font-size:13px; background:#fff; color:#2c2c2a; font-family:inherit;" onchange="calcTotals()">
            <option value="10">10%（標準）</option>
            <option value="8">8%（軽減税率）</option>
          </select>
        </div>
        <div class="total-row"><span>小計</span><span id="subtotal-ari">¥0</span></div>
        <div class="total-row"><span id="tax-label">消費税（10%）</span><span id="tax-amount-ari">¥0</span></div>
        <div class="total-row grand"><span>合計金額（税込）</span><span id="grand-total-ari">¥0</span></div>
      </div>
    </div>
  </div>

  <!-- 振込先 -->
  <div class="card">
    <div class="section-title">振込先</div>
    <div class="grid2">
      <div class="field"><label>銀行名</label><input type="text" id="bank-name" placeholder="〇〇銀行"></div>
      <div class="field"><label>支店名</label><input type="text" id="bank-branch" placeholder="〇〇支店"></div>
    </div>
    <div class="grid3" style="margin-top:12px">
      <div class="field"><label>支店番号</label><input type="text" id="bank-branch-num" placeholder="123"></div>
      <div class="field">
        <label>口座種別</label>
        <select id="bank-type">
          <option value="普通">普通</option>
          <option value="当座">当座</option>
        </select>
      </div>
      <div class="field"><label>口座番号</label><input type="text" id="bank-number" placeholder="1234567"></div>
    </div>
    <div class="field" style="margin-top:12px">
      <label>口座名義（カタカナ）</label>
      <input type="text" id="bank-holder" placeholder="ヤマダ タロウ">
    </div>
  </div>

  <!-- 備考 -->
  <div class="card">
    <div class="section-title">備考</div>
    <div class="field">
      <textarea id="notes">※ お振込手数料はご負担いただきますようお願いいたします。</textarea>
    </div>
  </div>

  <div id="success-msg" class="success-msg"></div>
  <div class="actions">
    <button class="btn-secondary" id="preview-btn">プレビューを確認する</button>
    <button class="btn-primary" id="submit-btn">請求書を完成させる</button>
  </div>
</div>

<!-- プレビューオーバーレイ -->
<div class="overlay" id="preview-modal">
  <div class="preview-box">
    <div class="preview-top">
      <div class="preview-title-block">
        <h2>請 求 書</h2>
        <div class="preview-inv-num" id="p-inv-num"></div>
      </div>
      <button class="close-btn" id="close-preview">✕</button>
    </div>
    <div class="preview-meta">
      <div>
        <div class="meta-label">ご請求先</div>
        <div class="meta-value" id="p-to">—</div>
        <div class="meta-sub" style="margin-top:8px;">
          件名：<span id="p-subject"></span><br>
          請求日：<span id="p-date"></span><br>
          支払期限：<span id="p-due"></span>
        </div>
      </div>
      <div style="text-align:right;">
        <div class="meta-label" style="text-align:right;">請求者</div>
        <div class="meta-value" id="p-from">—</div>
        <div class="meta-sub" id="p-from-detail" style="text-align:right;"></div>
        <div id="p-inv-reg-wrap" style="display:none; margin-top:6px; text-align:right;">
          <span class="inv-reg-badge" id="p-inv-reg"></span>
        </div>
      </div>
    </div>

    <table class="preview-table">
      <thead>
        <tr>
          <th>品目名</th>
          <th style="text-align:right">数量</th>
          <th style="text-align:right">単位</th>
          <th style="text-align:right">単価</th>
          <th style="text-align:right" id="p-th-amount">金額</th>
        </tr>
      </thead>
      <tbody id="p-items"></tbody>
    </table>

    <div class="preview-totals">
      <div id="p-totals-nashi">
        <div class="pt-row grand"><span>合計金額</span><span id="p-grand-nashi"></span></div>
      </div>
      <div id="p-totals-ari" style="display:none">
        <div class="pt-row"><span>小計</span><span id="p-subtotal"></span></div>
        <div class="pt-row"><span id="p-tax-label">消費税（10%）</span><span id="p-tax"></span></div>
        <div class="pt-row grand"><span>合計金額（税込）</span><span id="p-grand-ari"></span></div>
      </div>
    </div>

    <div class="preview-notes" id="p-notes" style="display:none"></div>

    <div class="preview-actions">
      <button class="btn-secondary" id="close-preview2">閉じる</button>
      <button class="btn-primary" id="print-btn">印刷 / PDF保存</button>
    </div>
  </div>
</div>

<script>
// ===== カテゴリ =====
const CATEGORIES = [
  "自社講座添削講師",
  "自社講座質問対応",
  "自社講座スケジュール管理",
  "Instagramマタニティアカウントフィード投稿作成",
  "Instagramマタニティアカウントリール投稿作成",
  "Instagram0歳フィード投稿作成",
  "Instagram0歳リール投稿作成",
  "Instagramリール添削代行",
  "Instagram投稿代行",
  "Instagramエルグラム代行",
  "Instagramディレクター",
  "Instagram自社商品質問対応",
  "Instagramフィード添削",
  "Instagramリール10万回再生回数インセンティブ",
  "Instagram運用楽天情報提供",
  "商品購入（詳細は下記）",
  "その他（詳細は下記）",
  "秘書業務"
];

// ===== インボイスモード =====
let invoiceMode = 'nashi'; // 'nashi' or 'ari'

function setInvoiceMode(mode) {
  invoiceMode = mode;
  document.getElementById('btn-nashi').className = 'toggle-btn' + (mode === 'nashi' ? ' active-nashi' : '');
  document.getElementById('btn-ari').className   = 'toggle-btn' + (mode === 'ari'   ? ' active-ari'   : '');
  const tag = document.getElementById('inv-mode-tag');
  tag.className = 'inv-tag ' + mode;
  tag.textContent = mode === 'ari' ? '適格請求書発行事業者' : '適格請求書発行事業者ではない';
  document.getElementById('inv-number-wrap').className = 'inv-number-field' + (mode === 'ari' ? ' show' : '');
  document.getElementById('totals-nashi').style.display = mode === 'nashi' ? '' : 'none';
  document.getElementById('totals-ari').style.display   = mode === 'ari'   ? '' : 'none';
  calcTotals();
}

function onRegNumberInput(val) {
  if (val.trim().length > 0 && invoiceMode !== 'ari') {
    setInvoiceMode('ari');
  }
}

// ===== 請求書番号 =====
function genInvoiceNumber() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const dateStr = `${y}${m}${d}`;
  const key = `inv_seq_${dateStr}`;
  let seq = 0;
  try { seq = parseInt(localStorage.getItem(key)||'0'); } catch(e){}
  seq += 1;
  try { localStorage.setItem(key, seq); } catch(e){}
  return `${dateStr}-${String(seq).padStart(2,'0')}`;
}
const INV_NUM = genInvoiceNumber();
document.getElementById('inv-num-display').textContent = INV_NUM;
document.getElementById('inv-badge').textContent = INV_NUM;

// ===== 日付初期値 =====
const today = new Date();
const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
document.getElementById('invoice-date').value = fmt(today);
const due = new Date(today.getFullYear(), today.getMonth() + 1, 0);
document.getElementById('due-date').value = fmt(due);

// ===== 明細 =====
let items = [];
let nextId = 1;

function buildSelect(selectedVal) {
  let html = `<option value="">品目を選択</option>`;
  CATEGORIES.forEach(c => {
    html += `<option value="${c}"${selectedVal===c?' selected':''}>${c}</option>`;
  });
  return html;
}

function addItem() {
  items.push({ id: nextId++, name:'', qty:1, unit:'ヶ月', price:0 });
  renderItems();
}

function removeItem(id) {
  items = items.filter(i => i.id !== id);
  renderItems();
}

function updateItem(id, field, value) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  if (field === "qty" || field === "price") item[field] = parseFloat(value)||0;
  else item[field] = value;

  const row = document.querySelector(`tr[data-id="${id}"]`);
  if (row) {
    const amt = Math.round(item.qty * item.price);
    const taxIncl = invoiceMode === "ari"
      ? `<br><span style="font-size:11px;color:#888780;">（税込 ¥${Math.round(amt*1.1).toLocaleString()}）</span>` : "";
    const amtCell = row.querySelector(".item-amount");
    if (amtCell) amtCell.innerHTML = `¥${amt.toLocaleString()}${taxIncl}`;
  }

  calcTotals();
}

function renderItems() {
  const tbody = document.getElementById('items-body');
  if (items.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:18px;color:#888780;font-size:13px;">明細を追加してください</td></tr>`;
    calcTotals(); return;
  }
  tbody.innerHTML = items.map(item => {
    const amt = Math.round(item.qty * item.price);
    const taxIncl = invoiceMode === 'ari' ? `<br><span style="font-size:11px;color:#888780;">（税込 ¥${Math.round(amt*1.1).toLocaleString()}）</span>` : '';
    return `<tr data-id="${item.id}">
      <td>
        <select onchange="updateItem(${item.id},'name',this.value)">${buildSelect(item.name)}</select>
        <input class="item-name-input" type="text" value="" placeholder="または直接入力"
          oninput="updateItem(${item.id},'name',this.value)" style="margin-top:4px;">
      </td>
      <td><input type="number" min="0" step="0.5" value="${item.qty}" oninput="updateItem(${item.id},'qty',this.value)" style="text-align:right"></td>
      <td><input type="text" value="${esc(item.unit)}" placeholder="ヶ月" oninput="updateItem(${item.id},'unit',this.value)"></td>
      <td><input type="number" min="0" step="1" value="${item.price||''}" placeholder="0" oninput="updateItem(${item.id},'price',this.value)" style="text-align:right"></td>
      <td class="item-amount">¥${amt.toLocaleString()}${taxIncl}</td>
      <td><button class="del-btn" onclick="removeItem(${item.id})">×</button></td>
    </tr>`;
  }).join('');
  calcTotals();
}

function calcTotals() {
  const subtotal = items.reduce((s,i) => s + Math.round(i.qty*i.price), 0);
  if (invoiceMode === 'nashi') {
    document.getElementById('grand-total-nashi').textContent = `¥${subtotal.toLocaleString()}`;
  } else {
    const rate = parseInt(document.getElementById('tax-rate').value)/100;
    const tax = Math.round(subtotal * rate);
    const pct = document.getElementById('tax-rate').value;
    document.getElementById('subtotal-ari').textContent  = `¥${subtotal.toLocaleString()}`;
    document.getElementById('tax-label').textContent     = `消費税（${pct}%）`;
    document.getElementById('tax-amount-ari').textContent = `¥${tax.toLocaleString()}`;
    document.getElementById('grand-total-ari').textContent = `¥${(subtotal+tax).toLocaleString()}`;
  }
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('add-item-btn').addEventListener('click', addItem);
addItem();

// ===== フォームデータ取得 =====
function getFormData() {
  const subtotal = items.reduce((s,i) => s + Math.round(i.qty*i.price), 0);
  const rate = invoiceMode === 'ari' ? parseInt(document.getElementById('tax-rate').value)/100 : 0;
  const tax  = Math.round(subtotal * rate);
  return {
    invNum:           INV_NUM,
    invoiceMode,
    invRegNumber:     document.getElementById('inv-reg-number').value,
    submitterName:    document.getElementById('submitter-name').value,
    submitterAddress: document.getElementById('submitter-address').value,
    submitterTel:     document.getElementById('submitter-tel').value,
    recipient:        document.getElementById('recipient').value,
    subject:          document.getElementById('subject').value,
    invoiceDate:      document.getElementById('invoice-date').value,
    dueDate:          document.getElementById('due-date').value,
    notes:            document.getElementById('notes').value,
    bankName:         document.getElementById('bank-name').value,
    bankBranch:       document.getElementById('bank-branch').value,
    bankBranchNum:    document.getElementById('bank-branch-num').value,
    bankType:         document.getElementById('bank-type').value,
    bankNumber:       document.getElementById('bank-number').value,
    bankHolder:       document.getElementById('bank-holder').value,
    taxRate:          invoiceMode === 'ari' ? document.getElementById('tax-rate').value : null,
    subtotal, tax, grandTotal: subtotal + tax,
    items: items.map(i => ({...i}))
  };
}

// ===== プレビュー描画 =====
function fillPreview(data) {
  document.getElementById('p-inv-num').textContent = `請求書番号：${data.invNum}`;
  document.getElementById('p-from').textContent = data.submitterName || '（未入力）';
  document.getElementById('p-from-detail').textContent = [data.submitterAddress, data.submitterTel].filter(Boolean).join('　');
  
  const regWrap = document.getElementById('p-inv-reg-wrap');
  if (data.invoiceMode === 'ari' && data.invRegNumber) {
    regWrap.style.display = '';
    document.getElementById('p-inv-reg').textContent = `登録番号：${data.invRegNumber}`;
  } else { regWrap.style.display = 'none'; }

  document.getElementById('p-to').textContent = data.recipient || '（未入力）';
  document.getElementById('p-subject').textContent = data.subject || '—';
  document.getElementById('p-date').textContent = data.invoiceDate || '—';
  document.getElementById('p-due').textContent  = data.dueDate    || '—';

  document.getElementById('p-items').innerHTML = data.items.map(i => {
    const amt = Math.round(i.qty * i.price);
    const amtCell = data.invoiceMode === 'ari'
      ? `¥${amt.toLocaleString()}<br><span style="font-size:11px;color:#888780;">税込 ¥${Math.round(amt*(1+parseInt(data.taxRate)/100)).toLocaleString()}</span>`
      : `¥${amt.toLocaleString()}`;
    return `<tr>
      <td>${esc(i.name||'—')}</td>
      <td style="text-align:right">${i.qty}</td>
      <td style="text-align:right">${esc(i.unit||'')}</td>
      <td style="text-align:right">¥${Math.round(i.price).toLocaleString()}</td>
      <td>${amtCell}</td>
    </tr>`;
  }).join('');

  if (data.invoiceMode === 'nashi') {
    document.getElementById('p-totals-nashi').style.display = '';
    document.getElementById('p-totals-ari').style.display   = 'none';
    document.getElementById('p-grand-nashi').textContent = `¥${data.subtotal.toLocaleString()}`;
  } else {
    document.getElementById('p-totals-nashi').style.display = 'none';
    document.getElementById('p-totals-ari').style.display   = '';
    document.getElementById('p-subtotal').textContent  = `¥${data.subtotal.toLocaleString()}`;
    document.getElementById('p-tax-label').textContent = `消費税（${data.taxRate}%）`;
    document.getElementById('p-tax').textContent       = `¥${data.tax.toLocaleString()}`;
    document.getElementById('p-grand-ari').textContent = `¥${data.grandTotal.toLocaleString()}`;
  }

  const notesEl = document.getElementById('p-notes');
  let notesHtml = '';
  // 振込先
  if (data.bankName || data.bankNumber) {
    notesHtml += `<strong style="font-size:12px;color:#c47a8a;text-transform:uppercase;letter-spacing:.06em;">振込先</strong><br>`;
    notesHtml += `${esc(data.bankName||'')}　${esc(data.bankBranch||'')}`;
    if (data.bankBranchNum) notesHtml += `（支店番号：${esc(data.bankBranchNum)}）`;
    notesHtml += `<br>${esc(data.bankType||'普通')}　${esc(data.bankNumber||'')}<br>`;
    notesHtml += `口座名義：${esc(data.bankHolder||'')}<br>`;
    notesHtml += `<span style="font-size:12px;color:#8a5a65;">※ お振込手数料はご負担いただきますようお願いいたします。</span>`;
  }
  // 備考
  if (data.notes) {
    if (notesHtml) notesHtml += '<br><br>';
    notesHtml += `<strong style="font-size:12px;color:#c47a8a;text-transform:uppercase;letter-spacing:.06em;">備考</strong><br>${esc(data.notes).replace(/\n/g,'<br>')}`;
  }
  if (notesHtml) {
    notesEl.style.display = '';
    notesEl.innerHTML = notesHtml;
  } else { notesEl.style.display = 'none'; }
}

// ===== ボタン =====
document.getElementById('preview-btn').addEventListener('click', () => {
  fillPreview(getFormData());
  document.getElementById('preview-modal').classList.add('open');
});

document.getElementById('submit-btn').addEventListener('click', () => {
  const data = getFormData();
  if (!data.submitterName) { alert('氏名 / 会社名を入力してください。'); document.getElementById('submitter-name').focus(); return; }
  fillPreview(data);
  document.getElementById('preview-modal').classList.add('open');
  const msg = document.getElementById('success-msg');
  msg.style.display = '';
  msg.textContent = `✓ 請求書 ${data.invNum} を作成しました。プレビューから「印刷 / PDF保存」を押して控えを保存してください。`;
});

document.getElementById('close-preview').addEventListener('click',  () => document.getElementById('preview-modal').classList.remove('open'));
document.getElementById('close-preview2').addEventListener('click', () => document.getElementById('preview-modal').classList.remove('open'));
document.getElementById('print-btn').addEventListener('click', () => {
  // Chrome系：ヘッダー・フッターなしで印刷
  const style = document.createElement('style');
  style.id = 'print-override';
  style.textContent = `@page { margin: 15mm; }`;
  document.head.appendChild(style);
  window.print();
  setTimeout(() => {
    const el = document.getElementById('print-override');
    if (el) el.remove();
  }, 1000);
});
document.getElementById('preview-modal').addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open'); });
</script>
</body>
</html>
